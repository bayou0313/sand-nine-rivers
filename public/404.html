<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <meta name="robots" content="noindex" />
    <script>
      // rafgraph/spa-github-pages — redirect deep links to / with the
      // original path encoded in the query string. index.html decodes it
      // back via history.replaceState before React Router boots.
      // pathSegmentsToKeep = 0 because riversand.net is at the apex.
      (function (l) {
        var pathSegmentsToKeep = 0;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }(window.location));
    </script>
  </head>
  <body></body>
</html>
